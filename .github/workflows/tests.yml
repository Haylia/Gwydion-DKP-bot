name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # No dependencies to install: the tests never import the bot (which would
      # need discord.py / gspread / creds). They ast-parse the source and exec
      # only the pure helpers, so the standard library is enough.
      - name: Run unit tests
        run: python run_tests.py
      - name: Syntax-check the bot
        run: python -m py_compile "gwydion dkp.py"
